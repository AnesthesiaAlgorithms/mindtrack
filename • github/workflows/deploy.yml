name: Deploy MindTrack
on:
  workflow_dispatch:
    inputs:
      content:
        description: 'New index.html content'
        required: true
        type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Update index.html
        run: |
          cat > index.html << 'HTMLEOF'
          ${{ github.event.inputs.content }}
          HTMLEOF
      - name: Commit and push
        run: |
          git config user.email "mindtrack@deploy.bot"
          git config user.name "MindTrack Bot"
          git add index.html
          git commit -m "Update MindTrack app"
          git push
