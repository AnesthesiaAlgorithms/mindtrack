name: Update MindTrack
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.CLAUDE_PAT }}
      - name: Push update
        run: |
          git config user.email "bot@mindtrack.app"
          git config user.name "MindTrack Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Update MindTrack app"
          git push
